name: extendedscreen
description: Use Samsung Galaxy Tab S10 Ultra as a second monitor for macOS via USB-C.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  # State management
  get: ^4.6.6

  # Networking / protocol
  protobuf: ^3.1.0

  # Secure storage (TLS cert, pairing tokens)
  flutter_secure_storage: ^9.2.2

  # Settings persistence
  shared_preferences: ^2.3.3

  # Permissions
  permission_handler: ^11.3.1

  # Logging
  logger: ^2.4.0

  # Keep screen awake while streaming
  wakelock_plus: ^1.2.8

  # Utils
  async: ^2.11.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
